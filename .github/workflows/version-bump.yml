name: Version Bump

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'VERSION'
      - '**/*.md'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        env:
          # Pass the commit message through the environment, NOT string-
          # interpolated into the run script below. Interpolating
          # ${{ github.event.head_commit.message }} directly splices the raw
          # message into the shell source, so a body containing backticks,
          # $(...) or | breaks the step (and is a command-injection vector).
          # The body of e3337f0 contained `vagrant up | Out-Host`, which is
          # exactly the syntax error this fixes.
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Determine bump type from the commit message ($COMMIT_MSG from env).
          if echo "$COMMIT_MSG" | grep -qiE '\[major\]'; then
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -qiE '\[minor\]'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          CURRENT=$(cat VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.version }}" > VERSION

      - name: Commit and push
        run: |
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push
